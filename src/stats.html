<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 400px;
      max-height: 500px;
      overflow-y: auto;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #333;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: #f5f7fa;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-box .value {
      font-size: 24px;
      font-weight: 600;
      color: #1a73e8;
    }
    .stat-box .label {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .page-list {
      margin-top: 8px;
    }
    .page-item {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }
    .page-item:last-child {
      border-bottom: none;
    }
    .page-title {
      font-weight: 500;
      font-size: 13px;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .page-domain {
      font-size: 11px;
      color: #888;
    }
    .page-stats {
      display: flex;
      gap: 12px;
      margin-top: 4px;
      font-size: 12px;
      color: #555;
    }
    .page-stats span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .triggers {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .trigger-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      background: #e8f0fe;
      color: #1a73e8;
    }
    .trigger-tag.dwell { background: #e6f4ea; color: #137333; }
    .trigger-tag.selection { background: #fef7e0; color: #b06000; }
    .trigger-tag.page { background: #f3e8fd; color: #7627bb; }
    .empty {
      text-align: center;
      padding: 40px 0;
      color: #888;
    }
    .session-info {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 12px;
    }
    button {
      margin-top: 12px;
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    button:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <h2>Session Stats</h2>

  <div class="summary">
    <div class="stat-box">
      <div class="value" id="totalWords">0</div>
      <div class="label">words captured</div>
    </div>
    <div class="stat-box">
      <div class="value" id="totalCaptures">0</div>
      <div class="label">captures</div>
    </div>
    <div class="stat-box">
      <div class="value" id="totalPages">0</div>
      <div class="label">pages</div>
    </div>
  </div>

  <div class="page-list" id="pageList"></div>

  <div class="session-info" id="sessionInfo"></div>

  <button id="resetBtn">Reset session stats</button>

  <script src="stats.js"></script>
</body>
</html>
